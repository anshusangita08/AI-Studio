{% extends "base.html" %}

{% block content %}

<h1>Projects</h1>

<p>
    <a href="/projects/new">➕ Create Project</a>
</p>

{% if projects %}

<table>

    <thead>

        <tr>
            <th>Name</th>
            <th>Created</th>
            <th>Open</th>
        </tr>

    </thead>

    <tbody>

    {% for project in projects %}

        <tr>

            <td>

                <a href="/projects/{{ project.slug }}">
                    {{ project.name }}
                </a>

            </td>

            <td>

                {{ project.created_at }}

            </td>

            <td>

                <a href="/projects/{{ project.slug }}">
                    Open
                </a>

            </td>

        </tr>

    {% endfor %}

    </tbody>

</table>

{% else %}

<p>No projects have been created yet.</p>

{% endif %}

{% endblock %}

{% extends "base.html" %}

{% block content %}

<h2>Create Project</h2>

{% if error %}
<div class="alert alert-danger">
    {{ error }}
</div>
{% endif %}

<form method="post">

<p>

<label>

Project Name

</label>

</p>

<p>

<input
    type="text"
    name="name"
    required
    autofocus>

</p>

<p>

<button type="submit">

Create

</button>

</p>

</form>

{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="container">
    <header class="d-flex justify-content-between align-items-center mb-6">
        <h1 class="h3 mb-0">Create Project</h1>

        <a href="/projects" class="btn btn-secondary">
            ← Back to Projects
        </a>
    </header>

    <p class="page-description">
        Create a new project to organize stories, scenes and generated assets.
    </p>

    {% if error %}
    <div class="alert alert-danger mb-4">
        {{ error }}
    </div>
    {% endif %}

    <div class="card create-project-card">
        <form method="post" class="create-project-form">

            <div class="form-group">
                <label for="name">Project Name</label>

                <input
                    id="name"
                    name="name"
                    type="text"
                    required
                    autofocus
                    placeholder="Enter a descriptive project name"
                    class="project-input">
            </div>

            <div class="create-project-actions">
                <button type="submit" class="btn btn-primary">
                    Create
                </button>
            </div>

        </form>
    </div>
</div>
{% endblock %}

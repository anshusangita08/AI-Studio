<form method="post" action="/projects/{{ project.slug }}/scenes">
    <div class="mb-3 mt-4">
        <h2>Scenes</h2>
        <p><strong>Editable.</strong> Loads scenes.md. Generate Scenes fills this textarea only. Save Scenes saves to scenes.md (separate from original and expanded story).</p>
        <textarea class="form-control" id="scenes-content" name="content" rows="15">{{ scenes_content }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary">Save Scenes</button>
    <button type="button" class="btn btn-secondary" id="generate-scenes-btn">🎬 Generate Scenes</button>
</form>

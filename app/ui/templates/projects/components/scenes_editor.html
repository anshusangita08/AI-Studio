<form method="post" action="/projects/{{ project.slug }}/scenes">

    <div class="scenes-editor">

        <div class="mb-4">
			<h2 class="mb-2">Scenes</h2>
			<p class="text-secondary mb-0">
				Review, edit and save your generated scenes.
			</p>
		</div>

       <p class="scenes-editor-description">
			<strong>Generate Scenes</strong> replaces the editor content.
			<strong>Save Scenes</strong> writes the current content to
			<code>scenes.md</code>.
		</p>
		
		<label for="scenes-content" class="d-block mb-2">
			Scene Content
		</label>
		
        <textarea
            class="form-control scenes-editor-textarea"
            id="scenes-content"
            name="content"
            rows="15">{{ scenes_content }}</textarea>
			

        <div class="scenes-editor-actions">

            <button type="submit" class="btn btn-primary">
                Save Scenes
            </button>

            <button
                type="button"
                class="btn btn-secondary"
                id="generate-scenes-btn">
                🎬 Generate Scenes
            </button>

            <a
                href="/projects/{{ project.slug }}"
                class="btn btn-secondary">
                ← Back to Project
            </a>

        </div>

    </div>

</form>

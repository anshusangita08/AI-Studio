<form method="post" action="/projects/{{ project.slug }}/story">

    <div class="story-editor">

        <div class="mb-4">
            <h2 class="mb-2">Story</h2>
            <p class="text-secondary mb-0">
                Create or edit your project's story.
            </p>
        </div>

        <p class="story-editor-description">
            Edit the story below and click <strong>Save Story</strong> to
            update <code>story.md</code>.
        </p>

        <label for="story-content" class="d-block mb-2">
            Story Content
        </label>

        <textarea
            class="form-control story-editor-textarea"
            id="story-content"
            name="content"
            rows="10">{{ story_content }}</textarea>

        <div class="story-editor-actions">

            <button type="submit" class="btn btn-primary">
                Save Story
            </button>

        </div>

    </div>

</form>

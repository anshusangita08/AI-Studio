<form method="post" action="/projects/{{ project.slug }}/story">

    <div class="story-editor">

        <h2 class="h5 mb-3">Story</h2>

        <p class="story-editor-description">
            <strong>Editable.</strong>
            Loads <code>story.md</code>. Save Story writes back to
            <code>story.md</code> (original).
        </p>

        <textarea
            class="form-control story-editor-textarea"
            id="story-content"
            name="content"
            rows="10">{{ story_content }}</textarea>

        <div class="story-editor-actions">
            <button type="submit" class="btn btn-primary">
                Save Story
            </button>
        </div>

    </div>

</form>

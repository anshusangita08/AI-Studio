<form method="post" action="/projects/{{ project.slug }}/story">
    <div class="mb-3">
        <h2>Story</h2>
        <p><strong>Editable.</strong> Loads story.md. Save Story saves to story.md (original).</p>
        <textarea class="form-control" id="story-content" name="content" rows="10">{{ story_content }}</textarea>
    </div>
    
    <button type="submit" class="btn btn-primary">Save Story</button>
</form>

<form method="post" action="/projects/{{ project.slug }}/expanded-story">

    <div class="expanded-story-editor">

        <div class="mb-4">
            <h2 class="mb-2">Expanded Story</h2>
            <p class="text-secondary mb-0">
                Review, edit and save the expanded version of your story.
            </p>
        </div>

        <p class="expanded-story-editor-description">
            <strong>Generate Story</strong> replaces the editor content.
            <strong>Save Expanded Story</strong> writes the current content to
            <code>expanded_story.md</code>.
        </p>

        <label for="expanded-story-content" class="d-block mb-2">
            Expanded Story Content
        </label>

        <textarea
            class="form-control expanded-story-editor-textarea"
            id="expanded-story-content"
            name="content"
            rows="15">{{ expanded_story_content }}</textarea>

        <div class="expanded-story-editor-actions">

            <button type="submit" class="btn btn-primary">
                Save Expanded Story
            </button>

            <button
                type="button"
                class="btn btn-secondary"
                id="generate-btn">
                ✨ Generate Story
            </button>

            <a
                href="/projects/{{ project.slug }}"
                class="btn btn-secondary">
                ← Back to Project
            </a>

        </div>

    </div>

</form>

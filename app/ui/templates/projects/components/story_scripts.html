{% if project %}
<script>
    // Handle Generate Story button
    const generateBtn = document.getElementById('generate-btn');

    if (generateBtn) {
        generateBtn.addEventListener('click', function () {

            fetch('/projects/{{ project.slug }}/story/generate', {
                method: 'POST'
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                if (data.expanded_story) {
                    document.getElementById('expanded-story-content').value =
                        data.expanded_story;
                }
            })
            .catch(err => console.error(err));

        });
    }
</script>

    const generateScenesBtn = document.getElementById('generate-scenes-btn');

{% endif %}

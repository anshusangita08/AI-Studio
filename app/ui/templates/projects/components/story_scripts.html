{% if project %}
<script>
    // Handle Generate Story button
    const generateBtn = document.getElementById('generate-btn');
    if (generateBtn) {
        generateBtn.addEventListener('click', function() {
            console.log("Generate Story handler entered");
            fetch('/projects/{{ project.slug }}/story/generate', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                }
            })
            .then(response => {
                console.log("Status", response.status);
                return response.text();
            })
            .then(text => JSON.parse(text))
            .then(data => {
                if (data.expanded_story) {
                    document.getElementById('expanded-story-content').value = data.expanded_story;
                }
            })
            .catch(err => console.error(err));
        });
    }
</script>

<script>
    // Handle Generate Scenes button
    const generateScenesBtn = document.getElementById('generate-scenes-btn');
    if (generateScenesBtn) {
        generateScenesBtn.addEventListener('click', function() {
            fetch('/projects/{{ project.slug }}/scenes/generate', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.scenes) {
                    document.getElementById('scenes-content').value = data.scenes;
                }
            })
            .catch(err => console.error(err));
        });
    }
</script>
{% endif %}

{% extends "base.html" %}

{% block content %}

<h1>{{ project.name }}</h1>

<p><strong>Slug</strong></p>
<p>{{ project.slug }}</p>

<p><strong>Created</strong></p>
<p>{{ project.created_at }}</p>

<p><strong>Updated</strong></p>
<p>{{ project.updated_at }}</p>

<hr>

<h2>Rename Project</h2>

<form
    action="/projects/{{ project.slug }}/rename"
    method="post"
>

    <input
        type="text"
        name="name"
        value="{{ project.name }}"
        required
        style="width:350px;"
    >

    <button type="submit">
        Save
    </button>

</form>

<br>

<p>

<a href="/projects">
← Back to Projects

</a>

</p>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>🎬 {{ project.name }}</h1>

    <hr>

    <p>
        <strong>Slug</strong><br>
        {{ project.slug }}
    </p>

    <p>
        <strong>Created</strong><br>
        {{ project.created_at }}
    </p>

    <p>
        <strong>Last Updated</strong><br>
        {{ project.updated_at }}
    </p>

    <hr>

    <h2>Rename Project</h2>

    <form
        action="/projects/{{ project.slug }}/rename"
        method="post"
    >

        <input
            type="text"
            name="name"
            value="{{ project.name }}"
            required
            style="width:350px;"
        >

        <button type="submit">
            Save
        </button>

    </form>

    <hr>

    <h2 style="color:#c62828;">
        Danger Zone
    </h2>

    <form
        action="/projects/{{ project.slug }}/delete"
        method="post"
        onsubmit="return confirm('Delete project &quot;{{ project.name }}&quot;?\n\nThis cannot be undone.');"
    >

        <button
            type="submit"
            style="
                background:#c62828;
                color:white;
                border:none;
                padding:10px 18px;
                border-radius:6px;
                cursor:pointer;
            "
        >
            🗑 Delete Project
        </button>

    </form>

    <br>

    <a href="/projects/">
        ← Back to Projects
    </a>

</div>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>📖 Story Planner</h1>

    <p>
        <strong>Project</strong><br>
        {{ project.name }}
    </p>

    <hr>

    {% if saved %}

    <div
        style="
            background:#d1e7dd;
            border:1px solid #badbcc;
            color:#0f5132;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
        "
    >
        ✅ Story saved successfully.
    </div>

    {% endif %}

    <form
        action="/projects/{{ project.slug }}/story"
        method="post"
    >

        {% include "components/editor_toolbar.html" %}

        <textarea
            id="story-editor"
            name="story"
            rows="24"
            style="
                width:100%;
                font-family:Consolas, monospace;
                font-size:15px;
                padding:12px;
                border:1px solid #ccc;
                border-radius:6px;
                resize:vertical;
                box-sizing:border-box;
            "
            placeholder="Start writing your story here..."
            oninput="updateStats()"
        >{{ story }}</textarea>

    </form>

    <hr>

    <a href="/projects/{{ project.slug }}">
        ← Back to Project
    </a>

</div>

<script>

function updateStats() {

    const editor =
        document.getElementById("story-editor");

    const text = editor.value;

    const trimmed = text.trim();

    const words =
        trimmed === ""
        ? 0
        : trimmed.split(/\s+/).length;

    document.getElementById(
        "word-count"
    ).textContent = words;

    document.getElementById(
        "char-count"
    ).textContent = text.length;

    document.getElementById(
        "editor-status"
    ).textContent = "Unsaved changes";
}

window.addEventListener(
    "load",
    updateStats
);

</script>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1>📖 Story Planner</h1>

    <p>
        <strong>Project</strong><br>
        {{ project.name }}
    </p>

    <hr>

    {% if saved %}

    <div
        style="
            background:#d1e7dd;
            border:1px solid #badbcc;
            color:#0f5132;
            padding:12px;
            border-radius:6px;
            margin-bottom:20px;
        "
    >
        ✅ Story saved successfully.
    </div>

    {% endif %}

    <form
        action="/projects/{{ project.slug }}/story"
        method="post"
    >

        {% include "components/editor_toolbar.html" %}

        <div
            style="
                display:flex;
                gap:20px;
                align-items:stretch;
            "
        >

            <div
                style="
                    flex:1;
                "
            >

                <h3>Editor</h3>

                <textarea
                    id="story-editor"
                    name="story"
                    rows="28"
                    style="
                        width:100%;
                        box-sizing:border-box;
                        font-family:Consolas, monospace;
                        font-size:15px;
                        padding:12px;
                        border:1px solid #ccc;
                        border-radius:6px;
                        resize:vertical;
                    "
                    placeholder="Start writing your story here..."
                    oninput="updateEditor()"
                >{{ story }}</textarea>

            </div>

            <div
                style="
                    flex:1;
                "
            >

                <h3>Preview</h3>

                <div
                    id="preview"
                    style="
                        min-height:620px;
                        border:1px solid #ccc;
                        border-radius:6px;
                        padding:12px;
                        background:#fafafa;
                        white-space:pre-wrap;
                        overflow:auto;
                    "
                ></div>

            </div>

        </div>

    </form>

    <hr>

    <a href="/projects/{{ project.slug }}">
        ← Back to Project
    </a>

</div>

<script>

function updateEditor() {

    const editor =
        document.getElementById("story-editor");

    const text =
        editor.value;

    const trimmed =
        text.trim();

    const words =
        trimmed === ""
        ? 0
        : trimmed.split(/\s+/).length;

    document.getElementById(
        "word-count"
    ).textContent = words;

    document.getElementById(
        "char-count"
    ).textContent = text.length;

    document.getElementById(
        "editor-status"
    ).textContent = "Unsaved changes";

    document.getElementById(
        "preview"
    ).textContent = text;
}

window.addEventListener(
    "load",
    updateEditor
);

</script>

{% endblock %}
